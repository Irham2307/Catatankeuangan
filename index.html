<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financely Cloud - Premium Money Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Font Klasik & Retro Baru (Space Grotesk & Syne) -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Memanggil CSS External di sini -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Pustaka SheetJS untuk Export Excel Sisi Client -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        .filter-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1; 
            min-width: 0;
        }
        
        .filter-container label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }
        
        .filter-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 12px;
            width: 100%;
        }

        .date-range-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            width: 100%;
        }

        .date-range-row .filter-container .input-control {
            padding: 10px 12px !important;
            font-size: 14px !important;
        }
        
        .btn-xlsx-inline {
            background: #d8f3dc !important;
            color: var(--retro-green) !important;
            border: 2px solid var(--text-main) !important;
            border-radius: 10px !important;
            padding: 12px 16px !important; 
            font-size: 13px !important;
            font-weight: 700 !important;
            text-transform: uppercase;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0; 
            height: 47px;   
            box-shadow: 3px 3px 0px 0px var(--text-main) !important;
            transition: all 0.15s ease;
            margin: 0 !important;
        }
        
        .btn-xlsx-inline:hover:not(:disabled) {
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0px 0px var(--text-main) !important;
            background: #b7e4c7 !important;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="pageMainMenu" class="view-page active">
            <div class="header">
                <h2>CATATAN KEUANGAN</h2>
                <p>Catat agar uang tidak boncos</p>
            </div>
            <div class="menu-options">
                <button class="btn-menu" onclick="switchPage('pageInputForm')">
                    <span>📝 Masukkan Catatan Keuangan</span>
                    <span class="icon">➔</span>
                </button>
                <button class="btn-menu" onclick="switchPage('pageHistory')">
                    <span>📊 Lihat Riwayat Transaksi</span>
                    <span class="icon">➔</span>
                </button>
            </div>
        </div>

        <div id="pageInputForm" class="view-page">
            <div class="header">
                <h2>Tambah Catatan</h2>
                <p>Simpan data langsung ke Cloud Database</p>
            </div>
            <form id="financeForm">
                <div class="form-group">
                    <label for="type">Jenis Transaksi</label>
                    <select id="type" class="input-control" required>
                        <option value="" disabled selected>Pilih Pemasukan / Pengeluaran</option>
                        <option value="Pemasukan">💰 Pemasukan</option>
                        <option value="Pengeluaran">💸 Pengeluaran</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Tanggal</label>
                    <input type="date" id="date" class="input-control" required>
                </div>
                <div class="form-group">
                    <label for="description">Nama Barang / Keterangan</label>
                    <input type="text" id="description" class="input-control" placeholder="Contoh: Kopi, Gaji bulanan" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Jumlah Barang</label>
                    <input type="number" id="quantity" class="input-control" min="1" placeholder="Contoh: 2" required>
                </div>
                <div class="form-group">
                    <label for="price">Harga Barang Satuan (Nominal)</label>
                    <input type="text" id="price" class="input-control" placeholder="Contoh: 15.000" required>
                </div>
                <button type="submit" id="btnSubmit" class="btn-submit">Simpan ke Cloud</button>
            </form>
            <button class="btn-back" onclick="switchPage('pageMainMenu')">Kembali ke Menu Utama</button>
            <div id="toastNotification" class="toast">✨ Tersimpan di Cloud Firestore!</div>
        </div>

        <div id="pageHistory" class="view-page">
            <div class="header">
                <h2>Riwayat Transaksi</h2>
                <p>Data langsung dimuat secara Real-time dari server</p>
            </div>
            
            <div class="summary-box">
                <!-- Judul Saldo Bersih Dinamis -->
                <span id="balanceTitle">Total Saldo Bersih</span>
                <h3 id="totalBalance">Menghitung...</h3>
            </div>

            <!-- Baris Kategori & Download -->
            <div class="filter-row">
                <div class="filter-container">
                    <label for="filterType">Kategori</label>
                    <select id="filterType" class="input-control">
                        <option value="Semua">🔍 Tampilkan Semua</option>
                        <option value="Pemasukan">💰 Hanya Pemasukan</option>
                        <option value="Pengeluaran">💸 Hanya Pengeluaran</option>
                    </select>
                </div>
                <button id="btnExportExcel" class="btn-xlsx-inline" onclick="window.exportToExcel()">
                    <span>📥 XLSX</span>
                </button>
            </div>

            <!-- Baris Filter Rentang Tanggal -->
            <div class="date-range-row">
                <div class="filter-container">
                    <label for="startDate">Dari Tanggal</label>
                    <input type="date" id="startDate" class="input-control">
                </div>
                <div class="filter-container">
                    <label for="endDate">Sampai Tanggal</label>
                    <input type="date" id="endDate" class="input-control">
                </div>
            </div>

            <!-- Container Feed List Kartu -->
            <div class="history-scroll-container">
                <div id="historyListContainer" class="transaction-list"></div>
                <div id="emptyState" class="empty-state">Memuat data dari database...</div>
            </div>

            <button class="btn-back" onclick="switchPage('pageMainMenu')" style="margin-top: auto;">Kembali ke Menu Utama</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG FIREBASE
        const firebaseConfig = {
          apiKey: "AIzaSyBuNSprPQDrFigaR5QoM6D9aFWOf0ybg3Y",
          authDomain: "catatankeuangan-a93e1.firebaseapp.com",
          projectId: "catatankeuangan-a93e1",
          storageBucket: "catatankeuangan-a93e1.firebasestorage.app",
          messagingSenderId: "453828512209",
          appId: "1:453828512209:web:82f924a00e0d31016838f0",
          measurementId: "G-V88MR4ZXR1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const transactionsCollection = collection(db, "transactions");

        document.getElementById('date').valueAsDate = new Date();

        const priceInput = document.getElementById('price');
        
        priceInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^0-9]/g, '');
            if (value) {
                this.value = parseInt(value, 10).toLocaleString('id-ID');
            } else {
                this.value = '';
            }
        });

        window.switchPage = function(pageId) {
            document.querySelectorAll('.view-page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        document.getElementById('financeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;
            const description = document.getElementById('description').value;
            const quantity = parseInt(document.getElementById('quantity').value, 10);
            
            const rawPrice = priceInput.value.replace(/\./g, '');
            const price = parseInt(rawPrice, 10);

            if (isNaN(price) || price <= 0 || isNaN(quantity) || quantity <= 0) {
                alert("Masukkan jumlah dan harga barang yang valid!");
                return;
            }

            const amount = quantity * price;

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Mengirim...";

            try {
                await addDoc(transactionsCollection, {
                    type,
                    date,
                    description,
                    quantity,
                    price,
                    amount,
                    createdAt: Date.now()
                });

                const toast = document.getElementById('toastNotification');
                toast.style.display = 'block';
                
                document.getElementById('type').value = "";
                document.getElementById('description').value = "";
                document.getElementById('quantity').value = "";
                priceInput.value = "";

                setTimeout(() => { toast.style.display = 'none'; }, 2500);
            } catch (error) {
                alert("Gagal menyimpan ke database cloud: " + error.message);
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Simpan ke Cloud";
            }
        });

        let allTransactions = [];
        let currentlyFilteredData = [];
        const filterSelect = document.getElementById('filterType');
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');

        const q = query(transactionsCollection, orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            allTransactions = [];
            snapshot.forEach((docSnap) => {
                allTransactions.push({
                    id: docSnap.id,
                    ...docSnap.data()
                });
            });
            
            allTransactions.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                if (dateB - dateA !== 0) {
                    return dateB - dateA;
                }
                return b.createdAt - a.createdAt;
            });

            renderTable();
        }, (error) => {
            console.error("Firestore Error:", error);
            document.getElementById('emptyState').innerText = "Gagal memuat data server: " + error.message;
        });

        filterSelect.addEventListener('change', renderTable);
        startDateInput.addEventListener('change', renderTable);
        endDateInput.addEventListener('change', renderTable);

        function renderTable() {
            const listContainer = document.getElementById('historyListContainer');
            const emptyState = document.getElementById('emptyState');
            const totalBalanceEl = document.getElementById('totalBalance');
            const balanceTitleEl = document.getElementById('balanceTitle');
            const btnExcel = document.getElementById('btnExportExcel');
            
            listContainer.innerHTML = '';
            let currentFilter = filterSelect.value;
            const startVal = startDateInput.value;
            const endVal = endDateInput.value;

            if (allTransactions.length === 0) {
                emptyState.innerText = 'Belum ada transaksi tercatat.';
                emptyState.style.display = 'block';
                listContainer.style.display = 'none';
                btnExcel.style.visibility = 'hidden'; 
                totalBalanceEl.innerText = 'Rp 0';
                totalBalanceEl.style.color = 'var(--text-main)';
                balanceTitleEl.innerText = 'Total Saldo Bersih';
                return;
            }

            // PERUBAHAN UTAMA 1: Jalankan penyaringan data TERLEBIH DAHULU sebelum menghitung total saldo
            currentlyFilteredData = allTransactions.filter(item => {
                if (currentFilter !== 'Semua' && item.type !== currentFilter) return false;
                if (startVal && item.date < startVal) return false;
                if (endVal && item.date > endVal) return false;
                return true;
            });

            // PERUBAHAN UTAMA 2: Hitung saldo bersih HANYA dari data hasil filter yang aktif (Dinamis)
            let dynamicBalance = 0;
            currentlyFilteredData.forEach(item => {
                const totalAmount = item.amount || (item.quantity * item.price) || 0;
                // Jika user menyeleksi filter "Hanya Pemasukan" atau "Hanya Pengeluaran",
                // program otomatis menjumlahkan secara absolut kategori tersebut untuk kenyamanan review laporan
                if (currentFilter === 'Semua') {
                    if (item.type === 'Pemasukan') dynamicBalance += totalAmount;
                    else dynamicBalance -= totalAmount;
                } else {
                    dynamicBalance += totalAmount;
                }
            });

            // Sesuaikan label teks panduan di atas saldo agar infonya akurat bagi pengguna
            if (currentFilter === 'Semua') {
                balanceTitleEl.innerText = 'Total Saldo Bersih (Periode Terpilih)';
            } else if (currentFilter === 'Pemasukan') {
                balanceTitleEl.innerText = 'Total Pemasukan (Periode Terpilih)';
            } else {
                balanceTitleEl.innerText = 'Total Pengeluaran (Periode Terpilih)';
            }

            totalBalanceEl.innerText = `Rp ${dynamicBalance.toLocaleString('id-ID')}`;
            
            // Pewarnaan teks angka saldo yang cerdas
            if (currentFilter === 'Pemasukan') {
                totalBalanceEl.style.color = 'var(--retro-green)';
            } else if (currentFilter === 'Pengeluaran') {
                totalBalanceEl.style.color = 'var(--retro-red)';
            } else {
                totalBalanceEl.style.color = dynamicBalance < 0 ? 'var(--retro-red)' : 'var(--retro-green)';
            }

            if (currentlyFilteredData.length === 0) {
                emptyState.innerText = `Tidak ada data untuk periode & kategori terpilih.`;
                emptyState.style.display = 'block';
                listContainer.style.display = 'none';
                btnExcel.style.visibility = 'hidden';
                return;
            }

            emptyState.style.display = 'none';
            listContainer.style.display = 'block';
            btnExcel.style.visibility = 'visible';

            currentlyFilteredData.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'transaction-card';
                
                const isPemasukan = item.type === 'Pemasukan';
                const colorClass = isPemasukan ? 'text-pemasukan' : 'text-pengeluaran';
                const prefix = isPemasukan ? '+' : '-';
                const totalAmount = item.amount || (item.quantity * item.price) || 0;

                const subDetail = item.quantity && item.price ? 
                    `<span class="tx-breakdown">(${item.quantity}x Rp ${item.price.toLocaleString('id-ID')})</span>` : '';

                card.innerHTML = `
                    <div class="tx-left">
                        <div class="tx-info">
                            <span class="tx-title">${item.description}</span>
                            <div class="tx-meta-row">
                                <span class="tx-date">${formatDate(item.date)}</span>
                                ${subDetail}
                            </div>
                        </div>
                    </div>
                    <div class="tx-right">
                        <span class="tx-amount ${colorClass}">${prefix}Rp ${totalAmount.toLocaleString('id-ID')}</span>
                        <button class="tx-btn-delete" onclick="deleteTransaction('${item.id}')" title="Hapus">🗑️</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        window.exportToExcel = function() {
            if (currentlyFilteredData.length === 0) {
                alert("Tidak ada data transaksi untuk diexport!");
                return;
            }

            const dataRows = currentlyFilteredData.map((item, index) => {
                const totalAmount = item.amount || (item.quantity * item.price) || 0;
                return {
                    'No': index + 1,
                    'Tanggal': item.date,
                    'Keterangan / Nama Barang': item.description,
                    'Jenis Transaksi': item.type,
                    'Jumlah (Qty)': item.quantity || 1,
                    'Harga Satuan': item.price || totalAmount,
                    'Total Nominal': totalAmount
                };
            });

            const worksheet = XLSX.utils.json_to_sheet(dataRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Catatan Keuangan");

            const maxColsWidth = [
                { wch: 6 }, { wch: 15 }, { wch: 30 }, { wch: 18 }, { wch: 12 }, { wch: 16 }, { wch: 18 }
            ];
            worksheet['!cols'] = maxColsWidth;

            const dateStr = new Date().toISOString().slice(0, 10);
            const filterName = filterSelect.value;
            const filename = `Laporan_Keuangan_${filterName}_${dateStr}.xlsx`;

            XLSX.writeFile(workbook, filename);
        };

        window.deleteTransaction = async function(docId) {
            if(confirm("Hapus transaksi ini dari Cloud database?")) {
                try {
                    const docRef = doc(db, "transactions", docId);
                    await deleteDoc(docRef);
                } catch (error) {
                    alert("Gagal menghapus data: " + error.message);
                }
            }
        }

        function formatDate(dateString) {
            const d = new Date(dateString);
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${String(d.getFullYear()).slice(-2)}`;
        }
    </script>
</body>
</html>
